---
- name: Arch Media Station - Setup
  hosts: all
  gather_facts: true
  become: true

  vars:
    # SSH connection
    ansible_user: "root"
    ansible_port: 22
    ansible_password: "testing"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

    # Installation variables
    root_password: "testing"
    user_name: "mediauser"
    user_password: "testing"
    hostname: "media-station"
    disk_device: "/dev/sda"
    disk_encryption_type: "none" # luks or none
    disk_encryption_password: ""
    bootloader: "grub"
    kernel: "linux-zen"
    timezone: "UTC"

    root_partition_size: "25G"
    snapshot_limit: 8
    snapshot_important_limit: 4

    # Packages definitions
    packages:
      - btrfs-progs
      - cockpit
      - ffmpeg
      - grub-btrfs
      - jellyfin-ffmpeg
      - jellyfin-mpv-shim
      - jellyfin-server
      - jellyfin-web
      - nfs-utils
      - nginx
      - openssh
      - openvpn
      - python-jellyfin-apiclient
      - qbittorrent-nox
      - rclone
      - rsync
      - snap-pac
      - snapper
      - ufw
      - "{{ 'networkmanager' if network_type in ['nm','nm_iwd'] else omit }}"
      - "{{ 'iwd' if network_type == 'nm_iwd' else omit }}"

    bare_metal_packages:
      - cpupower

    # Desktop/graphics profile
    profile_gfx_driver: "All open-source" # e.g., "Intel", "AMD", "Nvidia (proprietary)"
    profile_greeter: null # e.g., "gdm", "lightdm", null
    profile_main: "Xorg" # "Xorg" or "Wayland"
    profile_custom_settings: {} # any key/value custom settings
    profile_details: [] # extra profile details if needed

    # Services
    system_services:
      - grub-btrfsd
      - jellyfin
      - qbittorrent-nox
      - ufw
    bare_metal_services:
      - cpupower

    ufw_profiles:
      - SSH
      - "{{ 'WWW Secure' if ssl_cert_path is defined and ssl_cert_path | length > 0 else 'WWW' }}"
    ufw_ports:
      - 32400/tcp # Jellyfin

    # Optional secondary disk
    secondary_disk_uuid: "" # leave empty to skip
    secondary_disk_fs: "ext4" # optional, defaults to ext4
    secondary_disk_opts: "defaults" # same

    # Optional SSL certs path on controller
    # Must contain two files: fullchain.pem (certificate) and privkey.pem (private key)
    # leave empty to skip SSL
    ssl_cert_path: ""
    ntp_enabled: true
    parallel_downloads: 0

    # Encrypted password hashes
    root_password_hash: "{{ root_password | password_hash('sha512') }}"
    user_password_hash: "{{ user_password | password_hash('sha512') }}"

    # Selectable network options:
    # type: "nm" = NetworkManager, "nm_iwd" = NM with iwd, "manual" = manual config
    network_type: "nm_iwd"

    # Manual network example (only used if network_type="manual")
    manual_nics:
      - iface: "ens18"
        dhcp: true
        ip: null
        gateway: null
        dns: []

  tasks:
    - name: Determine if host is a VM
      set_fact:
        is_vm: "{{ ansible_virtualization_type in ['kvm','vmware','virtualbox','qemu','hyperv'] }}"

    - name: Add bare metal packages & services if not VM
      set_fact:
        packages: "{{ packages + bare_metal_packages }}"
        system_services: "{{ system_services + bare_metal_services }}"
      when: not is_vm

    - name: Inform user about execute_system_installation variable and pause
      pause:
        seconds: 3
        prompt: |
          [!] execute_system_installation flag not set. 
          Run with '-e execute_system_installation=true' to run the installation.
          Continuing...
      when: execute_system_installation is not defined

    - name: Run system installation
      when: execute_system_installation is defined
      block:
        - name: Calculate root partition size in bytes
          set_fact:
            root_partition_size_bytes: >-
              {%- set s = root_partition_size | upper -%}
              {%- if s.endswith('G') -%}
              {{ (s[:-1] | int) * 1024 * 1024 * 1024 }}
              {%- elif s.endswith('M') -%}
              {{ (s[:-1] | int) * 1024 * 1024 }}
              {%- elif s.endswith('B') -%}
              {{ s[:-1] | int }}
              {%- else -%}
              {{ s | int }}
              {%- endif -%}

        - name: Copy Archinstall config.json (Garuda-style)
          copy:
            dest: /tmp/config.json
            mode: "0600"
            content: |
              {
                "archinstall-language": "English",
                "auth_config": {},
                "bootloader_config": {
                  "bootloader": "{{ bootloader | title }}",
                  "removable": true,
                  "uki": false
                },
                "custom_commands": [
                  "sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config"
                  {%- if network_type in ['nm','nm_iwd'] %},
                  "systemctl enable sshd ufw",
                  "systemctl enable NetworkManager"{% endif %}
                  {%- if network_type == 'nm_iwd' %},
                  "systemctl enable iwd"{% endif %}
                ],
                "disk_config": {
                  "config_type": "default_layout",
                  "btrfs_options": {
                    "snapshot_config": null,
                    "compress": "zstd"
                  },
                  "device_modifications": [
                    {
                      "device": "{{ disk_device }}",
                      "wipe": true,
                      "partitions": [
                        {
                          "dev_path": null,
                          "flags": ["boot", "esp"],
                          "fs_type": "fat32",
                          "mountpoint": "/boot",
                          "mount_options": [],
                          "btrfs": [],
                          "obj_id": "{{ lookup('pipe','uuidgen') }}",
                          "start": {
                            "sector_size": {"unit": "B", "value": 512},
                            "unit": "MiB",
                            "value": 1
                          },
                          "size": {
                            "sector_size": {"unit": "B", "value": 512},
                            "unit": "GiB",
                            "value": 1
                          },
                          "status": "create",
                          "type": "primary"
                        },
                        {
                          "dev_path": null,
                          "flags": [],
                          "fs_type": "btrfs",
                          "mountpoint": "/",
                          "mount_options": ["compress=zstd", "noatime"],
                          "btrfs": [
                            {"name": "@", "mountpoint": "/"},
                            {"name": "@home", "mountpoint": "/home"},
                            {"name": "@cache", "mountpoint": "/var/cache"},
                            {"name": "@log", "mountpoint": "/var/log"},
                            {"name": "@snapshots", "mountpoint": "/.snapshots"}
                          ],
                          "obj_id": "{{ lookup('pipe','uuidgen') }}",
                          "start": {
                            "sector_size": {"unit": "B", "value": 512},
                            "unit": "B",
                            "value": 1074790400
                          },
                          "size": {
                            "sector_size": {"unit": "B", "value": 512},
                            "unit": "B",
                            "value": {{ root_partition_size_bytes }}
                          },
                          "status": "create",
                          "type": "primary"
                        }
                      ]
                    }
                  ]
                },
                "hostname": "{{ hostname }}",
                "kernels": ["{{ kernel }}"],
                "locale_config": {
                  "kb_layout": "us",
                  "sys_enc": "UTF-8",
                  "sys_lang": "en_US.UTF-8"
                },
                "mirror_config": {
                  "custom_repositories": [],
                  "custom_servers": [],
                  "mirror_regions": {},
                  "optional_repositories": []
                },
                "ntp": {{ ntp_enabled | lower }},
                "packages": {{ packages | to_json }},
                "parallel_downloads": {{ parallel_downloads }},
                "profile_config": {
                  "gfx_driver": "{{ profile_gfx_driver }}",
                  "greeter": {{ profile_greeter | to_json }},
                  "profile": {
                    "custom_settings": {{ profile_custom_settings | to_json }},
                    "details": {{ profile_details | to_json }},
                    "main": "{{ profile_main }}"
                  }
                }
                {%- if network_type in ["nm","nm_iwd"] %}
                ,"network_config": {"type": "{{ network_type }}"}
                {%- elif network_type == "manual" %}
                ,"network_config": {"type": "manual", "nics": {{ manual_nics | to_json }}}
                {%- endif %},
                "script": null,
                "services": [],
                "swap": {"algorithm": "zstd", "enabled": true},
                "timezone": "{{ timezone }}",
                "version": "3.0.15"
              }

        - name: Copy Archinstall creds.json
          copy:
            dest: /tmp/creds.json
            mode: "0600"
            content: |
              {
              {%- if disk_encryption_password is defined and disk_encryption_password | length > 0 %}
                "encryption_password": "{{ disk_encryption_password }}",
              {%- endif %}
                "root_enc_password": "{{ root_password_hash }}",
                "users": [
                  {
                    "username": "{{ user_name }}",
                    "enc_password": "{{ user_password_hash }}",
                    "sudo": true
                  }
                ]
              }

        - name: Show SSH command to follow Archinstall logs
          debug:
            msg: "Run: ssh {{ ansible_user }}@{{ inventory_hostname }} 'tail -f /var/log/archinstall/*.txt /var/log/archinstall/*.log'"

        - name: Install Arch Linux base system (synchronous)
          command: archinstall --config /tmp/config.json --creds /tmp/creds.json --silent

        - name: Reboot system (ignore if SSH lost)
          reboot:
            reboot_timeout: 10
          ignore_unreachable: true

        - name: Ask for new IP if needed
          pause:
            prompt: "Enter new IP of {{ inventory_hostname }} (press Enter if unchanged)"
          register: new_ip_input

        - name: Override Ansible host for the rest of the playbook
          set_fact:
            ansible_host: "{{ new_ip_input.user_input | default(ansible_host | default(inventory_hostname)) }}"
    # End of installation

    # Post-install media setup
    - name: Make sure packages are installed
      pacman:
        name: "{{ packages }}"
        state: "{{ 'latest' if (update_system_packages | default(false)) else 'present' }}"
        update_cache: yes
      notify: manage system services

    - name: Configure Snapper root snapshots
      block:
        - name: Create /.snapshots directory
          file:
            path: /.snapshots
            state: directory
            mode: "0755"
          notify: regenerate grub config

        - name: Create snapper root config
          command: snapper -c root create-config /
          args:
            creates: /etc/snapper/configs/root
          notify: regenerate grub config

        - name: Disable timeline snapshots
          lineinfile:
            path: /etc/snapper/configs/root
            regexp: "^TIMELINE_CREATE="
            line: "TIMELINE_CREATE='no'"
          notify: regenerate grub config

        - name: Set snapshot limit
          lineinfile:
            path: /etc/snapper/configs/root
            regexp: "^NUMBER_LIMIT="
            line: "NUMBER_LIMIT='{{ snapshot_limit }}'"
          notify: regenerate grub config

        - name: Set important snapshot limit
          lineinfile:
            path: /etc/snapper/configs/root
            regexp: "^NUMBER_LIMIT_IMPORTANT="
            line: "NUMBER_LIMIT_IMPORTANT='{{ snapshot_important_limit }}'"
          notify: regenerate grub config

    - name: Create Jellyfin media root directory
      file:
        path: /media
        state: directory
        owner: "{{ user_name }}"
        group: jellyfin
        mode: "2775"

    - name: Set Jellyfin group recursive on media
      file:
        path: /media
        state: directory
        recurse: true
        group: jellyfin
        mode: "2775"

    - name: Set CPU governor to performance
      lineinfile:
        path: /etc/default/cpupower-service.conf
        regexp: "^#?GOVERNOR="
        line: "GOVERNOR='performance'"
        create: true

    - name: Ensure qBittorrent service override directory exists
      file:
        path: /etc/systemd/system/qbittorrent-nox.service.d
        state: directory
        mode: "0755"
      notify: manage system services

    - name: Configure qbittorrent service override
      copy:
        dest: /etc/systemd/system/qbittorrent-nox.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          User={{ user_name }}
      notify: manage system services

    - name: Allow UFW application profiles
      ufw:
        rule: allow
        name: "{{ item }}"
      loop: "{{ ufw_profiles }}"
      notify: restart ufw

    - name: Allow UFW raw ports
      ufw:
        rule: allow
        port: "{{ item.split('/')[0] }}"
        proto: "{{ item.split('/')[1] }}"
      loop: "{{ ufw_ports }}"
      notify: restart ufw

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Mount secondary disk to /media
      block:
        - name: Ensure /media exists
          file:
            path: /media
            state: directory
            owner: "{{ user_name }}"
            group: jellyfin
            mode: "2775"

        - name: Add secondary disk to /etc/fstab
          mount:
            path: /media
            src: "UUID={{ secondary_disk_uuid }}"
            fstype: "{{ secondary_disk_fs | default('ext4') }}"
            opts: "{{ secondary_disk_opts }}"
            state: mounted
      when:
        - secondary_disk_uuid is defined
        - secondary_disk_uuid | length > 0

    - name: Copy SSL cert and key
      block:
        - name: Copy SSL certificate
          copy:
            src: "{{ ssl_cert_path }}/fullchain.pem"
            dest: "/etc/ssl/private/{{ hostname }}.crt"
            owner: root
            group: root
            mode: "0644"
            remote_src: true
          notify: restart nginx

        - name: Copy SSL private key
          copy:
            src: "{{ ssl_cert_path }}/privkey.pem"
            dest: "/etc/ssl/private/{{ hostname }}.key"
            owner: root
            group: root
            mode: "0600"
            remote_src: true
          notify: restart nginx
      when:
        - ssl_cert_path is defined
        - ssl_cert_path | length > 0

    - name: Create web root directory
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"
      notify: restart nginx

    - name: Deploy nginx configuration
      copy:
        dest: /etc/nginx/nginx.conf
        mode: "0644"
        content: |
          worker_processes auto;
          events { worker_connections 1024; }
          http {
            upstream jellyfin { server 127.0.0.1:8096; }
            upstream qbittorrent { server 127.0.0.1:8080; }
            include mime.types;
            default_type application/octet-stream;
            sendfile on;
            keepalive_timeout 65;
            server_tokens off;
            server {
              listen 80{{ ' default_server' if not (ssl_cert_path | length > 0) else '' }};
              server_name {{ hostname }};
          {%- if ssl_cert_path | length > 0 %}
              listen 443 ssl http2;
              ssl_certificate /etc/ssl/private/{{ hostname }}.crt;
              ssl_certificate_key /etc/ssl/private/{{ hostname }}.key;
          {%- endif %}
              location = / { return 302 {{ 'https' if ssl_cert_path | length > 0 else 'http' }}://$host/web/; }
              location / { 
                proxy_pass http://jellyfin; 
                proxy_set_header Host $host; 
                proxy_set_header X-Real-IP $remote_addr; 
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
                proxy_set_header X-Forwarded-Proto $scheme; 
                proxy_set_header X-Forwarded-Protocol $scheme; 
                proxy_set_header X-Forwarded-Host $http_host; 
                proxy_buffering off; 
              }
              location = /web/ { 
                proxy_pass http://jellyfin/web/index.html; 
                proxy_set_header Host $host; 
                proxy_set_header X-Real-IP $remote_addr; 
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
                proxy_set_header X-Forwarded-Proto $scheme; 
                proxy_set_header X-Forwarded-Protocol $scheme; 
                proxy_set_header X-Forwarded-Host $http_host; 
              }
              location /socket { 
                proxy_pass http://jellyfin; 
                proxy_http_version 1.1; 
                proxy_set_header Upgrade $http_upgrade; 
                proxy_set_header Connection "upgrade"; 
                proxy_set_header Host $host; 
                proxy_set_header X-Real-IP $remote_addr; 
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
                proxy_set_header X-Forwarded-Proto $scheme; 
                proxy_set_header X-Forwarded-Protocol $scheme; 
                proxy_set_header X-Forwarded-Host $http_host; 
              }
              location /torrent/ { 
                proxy_set_header Host $host; 
                proxy_set_header X-Real-IP $remote_addr; 
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
                proxy_set_header X-Forwarded-Proto $scheme; 
                proxy_set_header X-Forwarded-Protocol $scheme; 
                proxy_set_header X-Forwarded-Host $http_host; 
                proxy_pass http://qbittorrent; 
              }
            }
          }
      notify: restart nginx

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Flush handlers
      meta: flush_handlers

  handlers:
    - name: regenerate grub config
      command: grub-mkconfig -o /boot/grub/grub.cfg
      listen: "regenerate grub config"

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
        enabled: true
      listen: "restart nginx"

    - name: restart ufw
      systemd:
        name: ufw
        state: restarted
        enabled: true
      listen: "restart ufw"

    - name: manage system services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ system_services }}"
      listen: "manage system services"
