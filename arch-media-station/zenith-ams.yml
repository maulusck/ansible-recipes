---
# -----------------------------------------------------------------------------
# ZEnITH AMS – Zen Entertainment Integration Technology Haven Arch Media Station
# -----------------------------------------------------------------------------
# Overview:
#   ZEnITH AMS turns a plain Arch Linux machine into a fully equipped
#   media station. It provides:
#     • Media streaming via Jellyfin
#     • Torrent management via qBittorrent
#     • Web-based administration with Cockpit
#     • System monitoring with Glances
#     • Secure, SSL-enabled access via nginx reverse proxy
#     • Snapshots for safe updates and rollback
#
# Who is this for:
#   Anyone looking to quickly set up a robust media server on bare-metal
#   or virtual machines, with sensible defaults but full control over
#   users, disks, network, and services.
#
# Installation – First Run:
#   1. Set your desired variables in the playbook (hostname, users, disk,
#      encryption, packages, network type, etc.)
#   2. Run the playbook with the installation flag:
#        ansible-playbook zenith-ams.yml -e execute_system_installation=true
#      This will install the base system, configure disks, users, network,
#      and essential services, then reboot if needed.
#   3. Monitor logs during installation (optional):
#        ssh <ansible_user>@<host> 'tail -f /var/log/archinstall/*.log'
#
# Subsequent Runs:
#   Run the playbook without the installation flag to update packages,
#   reconfigure services, or apply any changes safely:
#        ansible-playbook zenith-ams.yml
#
# Philosophy:
#   Designed for simplicity, reliability, and maintainability. It provides
#   a working media station out of the box while leaving room for
#   customization and growth.
# -----------------------------------------------------------------------------

- name: ZEnITH AMS - Setup
  hosts: all
  gather_facts: true
  become: true
  # -------------------------------------------------------------------------
  # Arch Media Station
  # -------------------------------------------------------------------------

  vars:
    # -----------------------------
    # SSH & Remote Connection
    # -----------------------------
    ansible_user: "root" # default SSH user for installation
    ansible_port: 22 # SSH port
    ansible_password: "testing" # password for ansible_user
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    # -----------------------------
    # System Configuration
    # -----------------------------
    hostname: "media-station" # hostname for system
    timezone: "UTC" # timezone, e.g., 'Europe/Berlin'

    disk_device: "/dev/sda" # primary disk device
    root_partition_size: "25G" # root partition size
    disk_encryption_type: "none" # allowed: 'luks' or 'none'
    disk_encryption_password: "" # required if luks

    bootloader: "grub" # allowed: 'grub', 'systemd-boot'
    kernel: "linux-zen" # kernel package, e.g., 'linux', 'linux-zen', 'linux-lts'

    root_password: "testing" # root password for system; leave empty to disable root login
    user_name: "mediauser" # non-root user
    user_password: "testing" # non-root user password

    snapshot_limit: 8 # snapper normal snapshot limit
    snapshot_important_limit: 4 # snapper important snapshot limit

    # -----------------------------
    # Packages Definitions
    # -----------------------------
    packages:
      # Core filesystem & snapshots
      - btrfs-progs
      - grub-btrfs
      - snapper
      # Media server & playback
      - ffmpeg
      - jellyfin-mpv-shim
      - jellyfin-server
      - jellyfin-web
      - mediainfo
      - mpv
      # Networking & remote access
      - nfs-utils
      - nginx
      - openvpn
      - openssh
      - rclone
      - rsync
      - "{{ 'iwd' if network_type == 'nm_iwd' else omit }}"
      - "{{ 'networkmanager' if network_type in ['nm','nm_iwd'] else omit }}"
      # Security & firewall
      - openssl
      - ufw
      # System & monitoring
      - cockpit
      - glances
      - inotify-tools
      - python-fastapi
      - python-jellyfin-apiclient
      - qbittorrent-nox
      - snap-pac
      - uvicorn
      # Monitoring tools (TUI-friendly)
      - bmon
      - btop
      - htop
      - iotop
      # File management & utilities
      - bat
      - duf
      - mc
      - nano
      - ncdu
      - vim
      # Shell & CLI Enhancements
      - bash-completion
      - byobu
      - exa
      - fzf
      - ripgrep
      - starship
      - tmux
      - yt-dlp
      - zsh
      - zsh-completions
      - zoxide

    # -----------------------------
    # Bare Metal Packages
    # -----------------------------
    bare_metal_packages:
      - cpupower
      - smartmontools
      - lm_sensors
      - hdparm
      - nvme-cli
      - ethtool

    # -----------------------------
    # Desktop / Graphics Profile
    # -----------------------------
    profile_gfx_driver: "All open-source" # allowed: 'Intel', 'AMD', 'Nvidia (proprietary)', etc.
    profile_greeter: null # allowed: 'gdm', 'lightdm', null (headless)
    profile_main: "Xorg" # allowed: 'Xorg', 'Wayland'
    profile_custom_settings: {} # custom key/value settings for profile
    profile_details: [] # extra profile details if needed

    # -----------------------------
    # System Services
    # -----------------------------
    system_services:
      - cockpit.socket
      - glances-web
      - grub-btrfsd
      - jellyfin
      - qbittorrent-nox
      - ufw
    bare_metal_services:
      - cpupower

    # -----------------------------
    # Automatic Updates
    # -----------------------------
    enable_automatic_updates: false
    update_log_file: "/var/log/ams-update.log"

    # -----------------------------
    # UFW Firewall Profiles and Ports
    # -----------------------------
    ufw_profiles:
      - SSH
      - WWW
      - "WWW Secure"
    ufw_ports:
      - 32400/tcp

    # -----------------------------
    # Optional Secondary Disk
    # -----------------------------
    secondary_disk_uuid: "" # leave empty to skip mounting secondary disk
    secondary_disk_fs: "ext4" # optional, defaults to ext4
    secondary_disk_opts: "defaults,noatime,nodiratime"

    # -----------------------------
    # SSL Configuration
    # -----------------------------
    ssl_cert_dir: "/etc/ssl/private"
    # Optional custom cert/key
    ssl_cert_src: "" # leave empty to
    ssl_key_src: "" # e.g. /root/mykey.pem
    # Destination cert/key names (computed)
    ssl_cert_file: "{{ ssl_cert_dir ~ '/' ~ hostname ~ '.crt' }}"
    ssl_key_file: "{{ ssl_cert_dir ~ '/' ~ hostname ~ '.key' }}"
    ssl_subject: "/C=US/ST=None/L=None/O=MediaStation/OU=Server"

    # -----------------------------
    # Network
    # -----------------------------
    ntp_enabled: true
    parallel_downloads: 5
    network_type: "nm_iwd"
    manual_nics:
      - iface: "ens18"
        dhcp: true
        ip: null
        gateway: null
        dns: []

    # -----------------------------
    # Password Hashes (SHA512)
    # -----------------------------
    root_password_hash: "{{ root_password | password_hash('sha512') }}"
    user_password_hash: "{{ user_password | password_hash('sha512') }}"

    # -----------------------------
    # Archinstall Custom Commands
    # -----------------------------
    archinstall_custom_commands:
      # SSH: allow root login only if root_password is set
      - '{{ ''sed -i "s/^#PermitRootLogin .*/PermitRootLogin yes/" /etc/ssh/sshd_config''
        if root_password | length > 0 else '''' }}'
      # Enable essential services
      - "systemctl enable sshd ufw"
      # Enable NetworkManager if using nm or nm_iwd
      - "{{ 'systemctl enable NetworkManager' if network_type in ['nm','nm_iwd'] else '' }}"
      # Enable iwd if using nm_iwd combo
      - "{{ 'systemctl enable iwd' if network_type == 'nm_iwd' else '' }}"

  # -------------------------------------------------------------------------
  # Pre-tasks
  # -------------------------------------------------------------------------
  pre_tasks:
    - name: Detect virtualization type
      set_fact:
        is_vm: "{{ ansible_facts.virtualization_type in ['kvm','vmware','virtualbox','qemu','hyperv'] }}"

    - name: Merge bare metal packages/services (only on physical machines)
      set_fact:
        packages: "{{ (packages | default([])) + (bare_metal_packages | default([])) }}"
        system_services: "{{ (system_services | default([])) + (bare_metal_services | default([])) }}"
      when: not is_vm

    - name: Resolve SSL certificate paths
      set_fact:
        ssl_cert_file: "{{ ssl_cert_file if ssl_cert_file | length > 0 else ssl_cert_dir ~ '/' ~ hostname ~ '.crt' }}"
        ssl_key_file: "{{ ssl_key_file if ssl_key_file | length > 0 else ssl_cert_dir ~ '/' ~ hostname ~ '.key' }}"

  tasks:
    - name: Inform user about execute_system_installation variable and pause
      pause:
        seconds: 3
        prompt: |
          [!] execute_system_installation flag not set. 
          Run with '-e execute_system_installation=true' to run the installation.
          Continuing...
      when: execute_system_installation is not defined

    - name: Run system installation
      when: execute_system_installation is defined
      block:
        - name: Copy Archinstall config.json (Garuda-style)
          copy:
            dest: /tmp/config.json
            mode: "0600"
            content: |
              {
                "archinstall-language": "English",
                "auth_config": {},
                "bootloader_config": {"bootloader": "{{ bootloader | title }}", "removable": true, "uki": false},
                "custom_commands": {{ archinstall_custom_commands | to_json }},
                "disk_config": {
                  "config_type": "default_layout",
                  "encryption": "{{ disk_encryption_type }}",
                  "btrfs_options": {"snapshot_config": null, "compress": "zstd"},
                  "device_modifications": [
                    {
                      "device": "{{ disk_device }}",
                      "wipe": true,
                      "partitions": [
                        {
                          "dev_path": null,
                          "flags": ["boot","esp"],
                          "fs_type": "fat32",
                          "mountpoint": "/boot",
                          "mount_options": [],
                          "btrfs": [],
                          "obj_id": "{{ lookup('pipe','uuidgen') }}",
                          "start": {"sector_size": {"unit": "B","value": 512},"unit": "MiB","value": 1},
                          "size": {"sector_size": {"unit": "B","value": 512},"unit": "GiB","value": 1},
                          "status": "create",
                          "type": "primary"
                        },
                        {
                          "dev_path": null,
                          "flags": [],
                          "fs_type": "btrfs",
                          "mountpoint": null,
                          "mount_options": ["compress=zstd","noatime"],
                          "btrfs": [
                            {"name": "root","mountpoint": "/"},
                            {"name": "home","mountpoint": "/home"},
                            {"name": "cache","mountpoint": "/var/cache"},
                            {"name": "log","mountpoint": "/var/log"}
                          ],
                          "obj_id": "{{ lookup('pipe','uuidgen') }}",
                          "start": {"sector_size": {"unit": "B","value": 512},"unit": "B","value": 1074790400},
                          "size": {"sector_size": {"unit": "B","value": 512},"unit": "B","value": {{ root_partition_size | human_to_bytes }}},
                          "status": "create",
                          "type": "primary"
                        }
                      ]
                    }
                  ]
                },
                "hostname": "{{ hostname }}",
                "kernels": ["{{ kernel }}"],
                "locale_config": {"kb_layout": "us","sys_enc": "UTF-8","sys_lang": "en_US.UTF-8"},
                "mirror_config": {"custom_repositories": [],"custom_servers": [],"mirror_regions": {},"optional_repositories": []},
                "ntp": {{ ntp_enabled | lower }},
                "packages": {{ packages | to_json }},
                "parallel_downloads": {{ parallel_downloads }},
                "profile_config": {
                  "gfx_driver": "{{ profile_gfx_driver }}",
                  "greeter": {{ profile_greeter | to_json }},
                  "profile": {"custom_settings": {{ profile_custom_settings | to_json }},"details": {{ profile_details | to_json }},"main": "{{ profile_main }}"}
                }
                {%- if network_type in ["nm","nm_iwd"] %}
                ,"network_config": {"type": "{{ network_type }}"}
                {%- elif network_type == "manual" %}
                ,"network_config": {"type": "manual","nics": {{ manual_nics | to_json }}}
                {%- endif %},
                "script": null,
                "services": [],
                "swap": {"algorithm": "zstd","enabled": true},
                "timezone": "{{ timezone }}",
                "version": "3.0.15"
              }

        - name: Copy Archinstall creds.json
          copy:
            dest: /tmp/creds.json
            mode: "0600"
            content: |
              {
              {%- if disk_encryption_type == 'luks' %}
                "encryption_password": "{{ disk_encryption_password }}",
              {%- endif %}
                "root_enc_password": "{{ root_password_hash }}",
                "users": [{"username": "{{ user_name }}","enc_password": "{{ user_password_hash }}","sudo": true}]
              }

        - name: Show SSH command to follow Archinstall logs
          debug:
            msg: "Run: ssh {{ ansible_user }}@{{ inventory_hostname }} 'tail -f /var/log/archinstall/*.txt /var/log/archinstall/*.log'"

        - name: Install Arch Linux base system (synchronous)
          command: archinstall --config /tmp/config.json --creds /tmp/creds.json --silent

        - name: Reboot system (ignore if SSH lost)
          reboot:
            reboot_timeout: 60
          ignore_unreachable: true

        - name: Ask for new IP if needed
          pause:
            prompt: "Enter new IP of {{ inventory_hostname }} (press Enter if unchanged)"
          register: new_ip_input

        - name: Override Ansible host for the rest of the playbook
          set_fact:
            ansible_host: "{{ new_ip_input.user_input | default(ansible_host | default(inventory_hostname), true) }}"
    # End of installation

    # Post-install media setup
    - name: Re-gather facts after reboot and possible IP change
      setup:

    - name: Make sure packages are installed
      pacman:
        name: "{{ packages }}"
        state: "{{ 'latest' if (update_system_packages | default(false)) else 'present' }}"
        update_cache: true
        extra_args: --needed
      notify: reload system services

    - name: Configure Snapper root snapshots
      block:
        - name: Create snapper root config
          command: snapper -c root create-config /
          args:
            creates: /etc/snapper/configs/root
          notify: regenerate grub config

        - name: Configure snapper
          lineinfile:
            path: /etc/snapper/configs/root
            regexp: "{{ item.regexp }}"
            line: "{{ item.line }}"
          loop:
            - { regexp: "^TIMELINE_CREATE=", line: "TIMELINE_CREATE='no'" }
            - {
                regexp: "^NUMBER_LIMIT=",
                line: "NUMBER_LIMIT='{{ snapshot_limit }}'",
              }
            - {
                regexp: "^NUMBER_LIMIT_IMPORTANT=",
                line: "NUMBER_LIMIT_IMPORTANT='{{ snapshot_important_limit }}'",
              }
          notify: regenerate grub config

    - name: Create Jellyfin media root directory
      file:
        path: /media
        state: directory
        owner: "{{ user_name }}"
        group: jellyfin
        mode: "2775"

    - name: Set Jellyfin group recursive on media
      file:
        path: /media
        state: directory
        recurse: true
        group: jellyfin
        mode: "2775"

    - name: Set CPU governor to performance
      lineinfile:
        path: /etc/default/cpupower-service.conf
        regexp: "^#?GOVERNOR="
        line: "GOVERNOR='performance'"
        create: true

    - name: Ensure qBittorrent service override directory exists
      file:
        path: /etc/systemd/system/qbittorrent-nox.service.d
        state: directory
        mode: "0755"

    - name: Configure qbittorrent service override
      copy:
        dest: /etc/systemd/system/qbittorrent-nox.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          User={{ user_name }}
      notify: restart qbittorrent

    - name: Configure Cockpit to serve under /admin
      copy:
        dest: /etc/cockpit/cockpit.conf
        mode: "0644"
        content: |
          [WebService]
          # Origins = http://{{ hostname }} https://{{ hostname }} wss://{{ hostname }}
          Origins = *
          ProtocolHeader = X-Forwarded-Proto
          UrlRoot=/admin
      notify: restart cockpit

    - name: Configure UFW rules for profiles
      ufw:
        rule: allow
        name: "{{ item }}"
      loop: "{{ ufw_profiles }}"
      notify: restart ufw

    - name: Configure UFW rules for ports
      ufw:
        rule: allow
        port: "{{ item.split('/')[0] }}"
        proto: "{{ item.split('/')[1] }}"
      loop: "{{ ufw_ports }}"
      notify: restart ufw

    - name: Enable UFW
      ufw: { state: enabled }

    - name: Mount secondary disk to /media
      block:
        - name: Ensure /media exists
          file:
            path: /media
            state: directory
            owner: "{{ user_name }}"
            group: jellyfin
            mode: "2775"

        - name: Add secondary disk to /etc/fstab
          mount:
            path: /media
            src: "UUID={{ secondary_disk_uuid }}"
            fstype: "{{ secondary_disk_fs | default('ext4') }}"
            opts: "{{ secondary_disk_opts }}"
            state: mounted
      when: secondary_disk_uuid is defined and secondary_disk_uuid | length > 0

    - name: Ensure SSL cert/key exists
      block:
        - name: Ensure SSL directory exists
          file:
            path: "{{ ssl_cert_dir }}"
            state: directory
            owner: root
            group: root
            mode: "0700"

    - name: Copy custom SSL certificate/key if provided
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ ssl_cert_src }}"
          dest: "{{ ssl_cert_file }}"
          mode: "0644"
        - src: "{{ ssl_key_src }}"
          dest: "{{ ssl_key_file }}"
          mode: "0600"
      when: item.src | length > 0

    - name: Generate self-signed SSL certificate if missing
      command: >
        openssl req -x509 -nodes -newkey rsa:4096
        -keyout {{ ssl_key_file }}
        -out {{ ssl_cert_file }}
        -days 3650
        -subj "{{ ssl_subject }}/CN={{ ansible_facts.hostname }}{{ ',' + ansible_facts.fqdn if (ansible_facts.fqdn is defined and ansible_facts.fqdn != ansible_facts.hostname) else '' }}"
        -addext "subjectAltName=DNS:{{ ansible_facts.hostname }}{{ ',DNS:' + ansible_facts.fqdn if (ansible_facts.fqdn is defined and ansible_facts.fqdn != ansible_facts.hostname) else '' }}"
      args:
        creates: "{{ ssl_cert_file }}"
      when: ssl_cert_src | length == 0
      notify: restart nginx

    - name: Create web root directory
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"
      notify: restart nginx

    - name: Deploy AMS dashboard and SVG assets
      copy:
        mode: "0644"
        content: "{{ item.content }}"
        dest: "{{ item.dest }}"
      loop:
        - dest: /var/www/html/index.html
          content: |
            <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ZEnITH</title><link rel="icon" type="image/svg+xml" href="/favicon.svg"><style>
            body{background:#0c0d0e;color:#ddd;font-family:monospace;padding:40px;text-align:left;font-size:18px;}
            h1{color:#1793d1;font-weight:normal;display:flex;align-items:center;gap:10px;font-size:28px;}
            svg.logo{width:48px;height:48px;vertical-align:middle;}
            a{display:block;margin:6px 0;color:#1793d1;text-decoration:none;border:2px solid #1793d1;padding:6px 12px;border-radius:6px;transition:0.2s;font-size:18px;}
            a:hover{color:#fff;border-color:#fff;}
            a.logo-link{display:inline-block;margin:0;padding:0;border:none;} /* SVG link style */
            a.logo-link:hover{color:inherit;border:none;}
            @media(max-width:600px){
              body{text-align:center;padding:20px;font-size:22px;}
              h1{flex-direction:column;gap:8px;font-size:32px;}
              svg.logo{width:64px;height:64px;margin:0 auto;}
              a{margin:10px 0;padding:10px 16px;font-size:22px;}
            }
            </style></head><body>
            <h1><a href="https://goldrake.bot.nu/c/maulusck/ansible-recipes" class="logo-link" target="_blank"><svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><polygon points="100,10 190,180 10,180" fill="#1793d1" stroke="#fff" stroke-width="3"/><polygon points="100,30 170,170 30,170" fill="#1c1c1c"/><text x="50%" y="85%" text-anchor="middle" fill="#fff" font-family="monospace" font-size="24" font-weight="bold">ZEnITH</text></svg></a>ZEnITH - Arch Media Station</h1>
            <a href="/web/" target="_blank">Jellyfin</a><a href="/torrent/" target="_blank">qBittorrent</a><a href="/admin/" target="_blank">Cockpit</a><a href="/stats/" target="_blank">Glances</a>
            </body></html>
        - dest: /var/www/html/favicon.svg
          content: |
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
              <polygon points="100,30 190,180 10,180" fill="#1793d1" stroke="#fff" stroke-width="3"/>
              <polygon points="100,50 170,170 30,170" fill="#1c1c1c"/>
              <text x="50%" y="85%" text-anchor="middle" fill="#fff" font-family="monospace" font-size="48" font-weight="bold">Z</text>
            </svg>

    - name: Deploy nginx configuration
      copy:
        dest: /etc/nginx/nginx.conf
        mode: "0644"
        content: |
          worker_processes auto;
          events { worker_connections 1024; }
          http {
            upstream cockpit { server 127.0.0.1:9090; }
            upstream jellyfin { server 127.0.0.1:8096; }
            upstream qbittorrent { server 127.0.0.1:8080; }
            upstream glances { server 127.0.0.1:61208; }
            include mime.types;
            default_type application/octet-stream;
            sendfile on;
            keepalive_timeout 65;
            server_tokens off;
            server {
              listen 80 default_server;
              server_name {{ hostname }};
              return 301 https://$host$request_uri;
            }
            server {
              listen 443 ssl http2 default_server;
              server_name {{ hostname }};
              ssl_certificate {{ ssl_cert_file }};
              ssl_certificate_key {{ ssl_key_file }};
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_session_cache shared:SSL:10m;
              ssl_session_timeout 10m;
              ssl_prefer_server_ciphers on;
              ssl_session_tickets off;
              proxy_request_buffering off;
              set $proxy_headers '';
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Protocol $scheme;
              proxy_set_header X-Forwarded-Host $http_host;
              # AMS dashboard
              location = /favicon.svg { alias /var/www/html/favicon.svg; }
              location /ams { alias /var/www/html/; index index.html; }
              # Redirect to Jellyfin web UI
              location = / { return 302 https://$host/web/; }
              # Jellyfin main backend
              location / { proxy_pass http://jellyfin; proxy_buffering off; }
              # Jellyfin web interface
              location = /web/ { proxy_pass http://jellyfin/web/index.html; }
              # Jellyfin websocket
              location /socket {
                proxy_pass http://jellyfin;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
              # qBittorrent WebUI
              location /torrent/ { proxy_pass http://qbittorrent/; }
              # Cockpit admin panel
              location /admin/ {
                proxy_pass http://cockpit/admin/;
                proxy_ssl_verify off;
                proxy_http_version 1.1;
                proxy_buffering off;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                gzip off;
              }
              # Glances system stats
              location /stats/ {
                proxy_pass http://glances/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }
          }
      notify: restart nginx

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Deploy AMS update system
      block:
        - name: Deploy ams-update script
          copy:
            dest: /usr/local/bin/ams-update
            owner: root
            group: root
            mode: "0755"
            content: |
              #!/bin/bash
              set -euo pipefail
              ts() { date '+%Y-%m-%d %H:%M:%S'; }
              LOG="/var/log/ams-update.log"
              echo "[$(ts)] AMS update started" >> "$LOG"
              command -v snapper >/dev/null 2>&1 && snapper -c root create --description "pre-update $(ts)" >> "$LOG" 2>&1 || true
              pacman -Syu --noconfirm >> "$LOG" 2>&1 || true
              pacman -Qdtq 2>/dev/null | xargs -r pacman -Rns --noconfirm >> "$LOG" 2>&1 || true
              echo "[$(ts)] AMS update finished" >> "$LOG"

        - name: Create AMS update systemd service
          copy:
            dest: /etc/systemd/system/ams-update.service
            mode: "0644"
            owner: root
            group: root
            content: |
              [Unit]
              Description=AMS Automatic Update Service
              After=network.target

              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/ams-update
              StandardOutput=journal
              StandardError=journal

        - name: Create AMS update systemd timer
          copy:
            dest: /etc/systemd/system/ams-update.timer
            mode: "0644"
            owner: root
            group: root
            content: |
              [Unit]
              Description=Run AMS update daily

              [Timer]
              OnCalendar=daily
              Persistent=true

              [Install]
              WantedBy=timers.target

        - name: Reload systemd and enable timer if automatic updates enabled
          systemd:
            daemon_reload: true
            name: ams-update.timer
            state: "{{ 'started' if enable_automatic_updates | bool else 'stopped' }}"
            enabled: "{{ enable_automatic_updates | bool }}"

    - name: Enable and start system services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ system_services }}"

    - name: Flush handlers
      meta: flush_handlers

  handlers:
    - name: regenerate grub config
      command: grub-mkconfig -o /boot/grub/grub.cfg
      listen: "regenerate grub config"

    - name: restart cockpit
      systemd:
        name: cockpit.socket
        state: restarted
        daemon_reload: true

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
        daemon_reload: true

    - name: restart qbittorrent
      systemd:
        name: qbittorrent-nox
        state: restarted
        daemon_reload: true

    - name: restart ufw
      systemd:
        name: ufw
        state: restarted
        daemon_reload: true

    - name: reload system services
      systemd:
        name: "{{ item }}"
        state: restarted
      loop: "{{ system_services }}"
