---
# -----------------------------------------------------------------------------
# ZEnITH AMS – Arch Media Station
# -----------------------------------------------------------------------------
# Turns a fresh Arch Linux machine into a full-featured media server:
#   Jellyfin · qBittorrent · Cockpit · Glances · Nginx SSL · Snapshots · GUI
#
# Usage:
#   First-time install:  ansible-playbook zenith-ams.yml -e execute_system_installation=1
#   Maintenance/update:  ansible-playbook zenith-ams.yml
# -----------------------------------------------------------------------------

- name: ZEnITH AMS - Setup
  hosts: all
  gather_facts: true

  vars:
    # connection
    ansible_user: "root"
    ansible_port: 22
    ansible_password: "testing"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    # system
    hostname: "media-station"
    timezone: "UTC"
    kernel: "linux-zen" # linux | linux-zen | linux-lts
    bootloader: "grub" # grub | systemd-boot
    disk_device: "/dev/sda"
    root_partition_size: "25G"
    disk_encryption_type: "none" # none | luks
    disk_encryption_password: ""
    root_password: "testing" # empty = disable root login
    user_name: "media"
    user_password: "testing"

    # features
    enable_autologin: true
    enable_graphical: true
    enable_extras: true # pkg_cli — strip with -e enable_extras=false
    enable_automatic_updates: false
    jellyfin_autostart: true

    # network
    network_type: "nm_iwd" # nm | nm_iwd | manual
    ntp_enabled: true
    parallel_downloads: 15
    manual_nics:
      - iface: "ens18"
        dhcp: true
        ip: null
        gateway: null
        dns: []

    # firewall
    ufw_profiles: [SSH, WWW, "WWW Secure"]
    ufw_ports: ["32400/tcp"]

    # ssl
    ssl_cert_src: "" # empty = auto-generate self-signed CA
    ssl_key_src: ""
    ssl_ca_src: ""
    ssl_ca_key_src: ""
    ssl_subject: "/C=US/ST=None/L=None/O=MediaStation/OU=Server"

    # storage
    secondary_disk_uuid: "" # empty = skip /media mount
    secondary_disk_fs: "ext4"
    secondary_disk_opts: "defaults,noatime,nodiratime"

    # snapshots
    snapshot_limit: 8
    snapshot_important_limit: 4

    # graphical
    profile_gfx_driver: "All open-source"
    profile_greeter: null
    profile_main: "Xorg"
    profile_custom_settings: {}
    profile_details: []
    openbox_autostart_programs:
      - "feh --bg-fill /usr/share/backgrounds/zenith-wallpaper.svg &"
      - "unclutter &"
      - "picom &"
      - "{{ 'jellyfin-kiosk &' if jellyfin_autostart else omit }}"

    # packages
    pkg_extra: []

    # · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·

    pkg_core:
      - ffmpeg
      - jellyfin-server
      - jellyfin-web
      - mediainfo
      - qbittorrent-nox
      - nginx
      - cockpit
      - glances
      - python-fastapi
      - python-jellyfin-apiclient
      - uvicorn
      - btrfs-progs
      - grub-btrfs
      - snapper
      - snap-pac
      - inotify-tools
      - openssh
      - openssl
      - ufw
      - nfs-utils
      - openvpn
      - rclone
      - rsync
      - yt-dlp
      - btop
      - htop
      - iotop
      - bmon

    pkg_network: >-
      {{
        (['networkmanager'] if network_type in ['nm','nm_iwd'] else [])
        + (['iwd']          if network_type == 'nm_iwd'        else [])
      }}

    pkg_cli:
      - 7zip
      - bash-completion
      - bat
      - byobu
      - duf
      - exa
      - fastfetch
      - fzf
      - less
      - mc
      - mpv
      - nano
      - ncdu
      - ripgrep
      - tmux
      - unrar
      - unzip
      - vim
      - zoxide
      - zsh
      - zsh-completions

    pkg_bare_metal:
      - cpupower
      - ethtool
      - hdparm
      - lm_sensors
      - nvme-cli
      - smartmontools

    pkg_graphical:
      - doublecmd-qt6
      - feh
      - firefox
      - fuse
      - gvfs
      - jellyfin-mpv-shim
      - openbox
      - picom
      - qps
      - rofi
      - unclutter
      - xorg-server
      - xorg-xinit
      - xorg-xrandr
      - xorg-xset
      - xterm

    pkg_drivers:
      - libxxf86vm
      - xf86-input-libinput
      - xf86-input-evdev
      - xf86-input-synaptics
      - xf86-input-vmmouse
      - xf86-video-amdgpu
      - xf86-video-ati
      - xf86-video-intel
      - xf86-video-nouveau
      - xf86-video-fbdev
      - xf86-video-vesa
      - xf86-video-dummy
      - xf86-video-qxl

    # services
    svc_core:
      - cockpit.socket
      - glances-web
      - grub-btrfsd
      - jellyfin
      - nginx
      - qbittorrent-nox
      - ufw

    svc_bare_metal:
      - cpupower

    # ssl
    ssl_cert_dir: "/etc/ssl/private"

    # wallpaper
    wallpaper_svg: "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'><rect width='100%' height='100%' fill='#0c0d0e'/><g opacity='.04' stroke='#fff'><path d='M0 200h1920M0 400h1920M0 600h1920M0 800h1920'/></g><polygon points='960,220 1240,760 680,760' fill='#1793d1'/><polygon points='960,300 1180,720 740,720' fill='#1c1c1c'/><polygon points='960,220 1240,760 680,760' fill='none' stroke='#1793d1' stroke-width='6' opacity='.25'/><text x='960' y='820' text-anchor='middle' fill='#fff' font-family='monospace' font-size='42' letter-spacing='6' opacity='.85'>ZEnITH</text><text x='960' y='860' text-anchor='middle' fill='#1793d1' font-family='monospace' font-size='16' opacity='.7'>Arch Media Station</text></svg>"

    # computed
    root_password_hash: "{{ root_password | password_hash('sha512') }}"
    user_password_hash: "{{ user_password | password_hash('sha512') }}"
    pkg_state: "{{ 'latest' if update_system_packages | default(false) | bool else 'present' }}"
    reboot_timeout: 180

    archinstall_custom_commands: >-
      {{
        ([] if not root_password else ['sed -i "s/^#PermitRootLogin .*/PermitRootLogin yes/" /etc/ssh/sshd_config'])
        + ['systemctl enable sshd ufw']
        + (['systemctl enable NetworkManager'] if network_type in ['nm','nm_iwd'] else [])
        + (['systemctl enable iwd'] if network_type == 'nm_iwd' else [])
      }}

  # · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·
  pre_tasks:
    - name: Assemble
      set_fact:
        is_vm: "{{ ansible_facts.virtualization_type in ['kvm','vmware','virtualbox','qemu','hyperv'] }}"
        packages: >-
          {{
            (pkg_core + pkg_network)
            + (pkg_cli                           if enable_extras    | bool else [])
            + (pkg_bare_metal                    if not is_vm        | bool else [])
            + (pkg_graphical + pkg_drivers       if enable_graphical | bool else [])
            + pkg_extra
            | unique
          }}
        svc_core: >-
          {{
            svc_core
            + (svc_bare_metal               if not is_vm        | bool else [])
          }}

  # · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·
  tasks:
    # install
    - name: Warn if installation flag not set
      pause:
        seconds: 3
        prompt: "[!] Pass -e execute_system_installation=1 for first-time install. Continuing as maintenance run..."
      when: not execute_system_installation | default(false) | bool

    - name: Run system installation
      when: execute_system_installation | default(false) | bool
      block:
        - name: Write archinstall config.json
          copy:
            dest: /tmp/config.json
            mode: "0600"
            content: |
              {
                "archinstall-language": "English",
                "auth_config": {},
                "bootloader_config": {"bootloader": "{{ bootloader | title }}", "removable": true, "uki": false},
                "custom_commands": {{ archinstall_custom_commands | to_json }},
                "disk_config": {
                  "config_type": "default_layout",
                  "encryption": "{{ disk_encryption_type }}",
                  "btrfs_options": {"snapshot_config": null, "compress": "zstd"},
                  "device_modifications": [{
                    "device": "{{ disk_device }}", "wipe": true,
                    "partitions": [
                      {"dev_path": null, "flags": ["boot","esp"], "fs_type": "fat32",
                       "mountpoint": "/boot", "mount_options": [], "btrfs": [],
                       "obj_id": "{{ lookup('pipe','uuidgen') }}",
                       "start": {"sector_size": {"unit":"B","value":512},"unit":"MiB","value":1},
                       "size":  {"sector_size": {"unit":"B","value":512},"unit":"GiB","value":1},
                       "status": "create", "type": "primary"},
                      {"dev_path": null, "flags": [], "fs_type": "btrfs",
                       "mountpoint": null, "mount_options": ["compress=zstd","noatime"],
                       "btrfs": [
                         {"name":"root","mountpoint":"/"},
                         {"name":"home","mountpoint":"/home"},
                         {"name":"cache","mountpoint":"/var/cache"},
                         {"name":"log","mountpoint":"/var/log"}
                       ],
                       "obj_id": "{{ lookup('pipe','uuidgen') }}",
                       "start": {"sector_size": {"unit":"B","value":512},"unit":"B","value":1074790400},
                       "size":  {"sector_size": {"unit":"B","value":512},"unit":"B","value":{{ root_partition_size | human_to_bytes }}},
                       "status": "create", "type": "primary"}
                    ]
                  }]
                },
                "hostname": "{{ hostname }}",
                "kernels": ["{{ kernel }}"],
                "locale_config": {"kb_layout":"us","sys_enc":"UTF-8","sys_lang":"en_US.UTF-8"},
                "mirror_config": {"custom_repositories":[],"custom_servers":[],"mirror_regions":{},"optional_repositories":[]},
                "ntp": {{ ntp_enabled | lower }},
                "packages": {{ packages | to_json }},
                "parallel_downloads": {{ parallel_downloads }},
                "profile_config": {
                  "gfx_driver": "{{ profile_gfx_driver }}",
                  "greeter": {{ profile_greeter | to_json }},
                  "profile": {"custom_settings": {{ profile_custom_settings | to_json }}, "details": {{ profile_details | to_json }}, "main": "{{ profile_main }}"}
                }
                {%- if network_type in ["nm","nm_iwd"] %}
                ,"network_config": {"type": "{{ network_type }}"}
                {%- elif network_type == "manual" %}
                ,"network_config": {"type": "manual", "nics": {{ manual_nics | to_json }}}
                {%- endif %},
                "script": null, "services": [],
                "swap": {"algorithm": "zstd", "enabled": true},
                "timezone": "{{ timezone }}",
                "version": "3.0.15"
              }

        - name: Write archinstall creds.json
          copy:
            dest: /tmp/creds.json
            mode: "0600"
            content: |
              {
              {%- if disk_encryption_type == 'luks' %}
                "encryption_password": "{{ disk_encryption_password }}",
              {%- endif %}
                "root_enc_password": "{{ root_password_hash }}",
                "users": [{"username":"{{ user_name }}","enc_password":"{{ user_password_hash }}","sudo":true}]
              }

        - name: Show log tail command
          debug:
            msg: "ssh {{ ansible_ssh_common_args }} {{ ansible_user }}@{{ inventory_hostname }} 'tail -f /var/log/archinstall/*.log'"

        - name: Install Arch Linux
          command: archinstall --config /tmp/config.json --creds /tmp/creds.json --silent

        - name: Reboot after install
          reboot:
            reboot_timeout: "{{ reboot_timeout }}"
          ignore_unreachable: true

        - name: Prompt for new IP if changed
          pause:
            prompt: "New IP for {{ inventory_hostname }}? (Enter to keep current)"
          register: new_ip_input

        - name: Apply new IP if provided
          set_fact:
            ansible_host: "{{ new_ip_input.user_input | default(ansible_host | default(inventory_hostname), true) }}"

        - name: Re-gather facts
          setup:

    # packages
    - name: Ensure packages are installed
      pacman:
        name: "{{ packages }}"
        state: "{{ pkg_state }}"
        update_cache: true
        extra_args: --needed

    # snapper
    - name: Create snapper root config
      command: snapper -c root create-config /
      args:
        creates: /etc/snapper/configs/root
      notify: regenerate grub config

    - name: Configure snapper
      lineinfile:
        path: /etc/snapper/configs/root
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^TIMELINE_CREATE=", line: "TIMELINE_CREATE='no'" }
        - {
            regexp: "^NUMBER_LIMIT=",
            line: "NUMBER_LIMIT='{{ snapshot_limit }}'",
          }
        - {
            regexp: "^NUMBER_LIMIT_IMPORTANT=",
            line: "NUMBER_LIMIT_IMPORTANT='{{ snapshot_important_limit }}'",
          }

    # media
    - name: Ensure /media exists with correct ownership
      file:
        path: /media
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0755"

    - name: Mount secondary disk at /media
      mount:
        path: /media
        src: "UUID={{ secondary_disk_uuid }}"
        fstype: "{{ secondary_disk_fs }}"
        opts: "{{ secondary_disk_opts }}"
        state: mounted
      when: secondary_disk_uuid | length > 0

    - name: Set Jellyfin ACL on /media (current and default for new files)
      acl:
        path: /media
        entity: jellyfin
        etype: group
        permissions: rx
        recurse: "{{ item.recurse }}"
        default: "{{ item.default }}"
        state: present
      loop:
        - { recurse: true, default: false }
        - { recurse: false, default: true }

    # cpu governor
    - name: Set CPU governor to performance
      lineinfile:
        path: /etc/default/cpupower-service.conf
        regexp: "^#?GOVERNOR="
        line: "GOVERNOR='performance'"
        create: true
      when: not is_vm

    # qbittorrent
    - name: Ensure qBittorrent service override directory
      file:
        path: /etc/systemd/system/qbittorrent-nox.service.d
        state: directory
        mode: "0755"

    - name: Configure qBittorrent service user
      copy:
        dest: /etc/systemd/system/qbittorrent-nox.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          User={{ user_name }}
      notify: restart qbittorrent

    # cockpit
    - name: Configure Cockpit under /admin
      copy:
        dest: /etc/cockpit/cockpit.conf
        mode: "0644"
        content: |
          [WebService]
          Origins = *
          ProtocolHeader = X-Forwarded-Proto
          UrlRoot=/admin
      notify: restart cockpit

    # firewall
    - name: Allow UFW profiles
      ufw:
        rule: allow
        name: "{{ item }}"
      loop: "{{ ufw_profiles }}"

    - name: Allow UFW ports
      ufw:
        rule: allow
        port: "{{ item.split('/')[0] }}"
        proto: "{{ item.split('/')[1] }}"
      loop: "{{ ufw_ports }}"

    - name: Enable UFW
      ufw:
        state: enabled
      notify: restart ufw

    # ssl
    - name: Ensure SSL directory
      file:
        path: "{{ ssl_cert_dir }}"
        state: directory
        mode: "0700"

    - name: Copy user-provided SSL files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
        remote_src: false
      loop:
        - {
            src: "{{ ssl_cert_src }}",
            dest: "{{ ssl_cert_dir }}/{{ hostname }}.crt",
            mode: "0644",
          }
        - {
            src: "{{ ssl_key_src }}",
            dest: "{{ ssl_cert_dir }}/{{ hostname }}.key",
            mode: "0600",
          }
        - {
            src: "{{ ssl_ca_src }}",
            dest: "{{ ssl_cert_dir }}/{{ hostname }}-ca.crt",
            mode: "0644",
          }
        - {
            src: "{{ ssl_ca_key_src }}",
            dest: "{{ ssl_cert_dir }}/{{ hostname }}-ca.key",
            mode: "0600",
          }
      when: item.src | length > 0

    - name: Generate local CA if missing
      command: >
        openssl req -x509 -nodes -newkey ec -pkeyopt ec_paramgen_curve:P-384
        -keyout "{{ ssl_cert_dir }}/{{ hostname }}-ca.key"
        -out "{{ ssl_cert_dir }}/{{ hostname }}-ca.crt"
        -days 3650 -subj "{{ ssl_subject }}/CN={{ hostname }} CA"
        -addext "basicConstraints=CA:TRUE,pathlen:0"
        -addext "keyUsage=keyCertSign,cRLSign"
      args:
        creates: "{{ ssl_cert_dir }}/{{ hostname }}-ca.crt"

    - name: Generate host certificate if missing
      command: >
        openssl req -new -nodes -newkey ec -pkeyopt ec_paramgen_curve:P-384
        -keyout "{{ ssl_cert_dir }}/{{ hostname }}.key"
        -out "{{ ssl_cert_dir }}/{{ hostname }}.crt"
        -days 3650 -sha256 -subj "{{ ssl_subject }}/CN={{ hostname }}"
        -CA "{{ ssl_cert_dir }}/{{ hostname }}-ca.crt"
        -CAkey "{{ ssl_cert_dir }}/{{ hostname }}-ca.key"
        -CAcreateserial
        -addext "basicConstraints=CA:FALSE"
        -addext "keyUsage=digitalSignature,keyEncipherment"
        -addext "extendedKeyUsage=serverAuth,clientAuth"
        -addext "subjectAltName=DNS:{{ hostname }}"
      args:
        creates: "{{ ssl_cert_dir }}/{{ hostname }}.crt"
      notify: restart nginx

    - name: Trust local CA
      copy:
        src: "{{ ssl_cert_dir }}/{{ hostname }}-ca.crt"
        dest: "/etc/ca-certificates/trust-source/anchors/{{ hostname }}-ca.crt"
        mode: "0644"
        remote_src: true
      notify: update ca trust

    # nginx
    - name: Ensure web root
      file:
        path: /var/www/html
        state: directory
        mode: "0755"

    - name: Deploy AMS dashboard
      copy:
        dest: "{{ item.dest }}"
        mode: "0644"
        content: "{{ item.content }}"
      loop:
        - dest: /var/www/html/index.html
          content: |
            <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ZEnITH - {{ hostname }}</title><link rel="icon" type="image/svg+xml" href="/favicon.svg"><style>
            body{background:#0c0d0e;color:#ddd;font-family:monospace;padding:40px;text-align:left;font-size:18px;}
            h1{color:#1793d1;font-weight:normal;display:flex;align-items:center;gap:10px;font-size:28px;}
            svg.logo{width:48px;height:48px;vertical-align:middle;}
            .subtitle{font-size:14px;color:#888;margin-left:58px;}
            a{display:block;margin:6px 0;color:#1793d1;text-decoration:none;border:2px solid #1793d1;padding:6px 12px;border-radius:6px;transition:0.2s;font-size:18px;}
            a:hover{color:#fff;border-color:#fff;}
            a.logo-link{display:inline-block;margin:0;padding:0;border:none;}
            a.logo-link:hover{color:inherit;border:none;}
            @media(max-width:600px){body{text-align:center;padding:20px;font-size:22px;}h1{flex-direction:column;gap:8px;font-size:32px;}svg.logo{width:64px;height:64px;margin:0 auto;}a{margin:10px 0;padding:10px 16px;font-size:22px;}.subtitle{margin-left:0;}}
            </style></head><body>
            <h1><a href="https://goldrake.bot.nu/c/maulusck/ansible-recipes" class="logo-link" target="_blank"><svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><polygon points="100,10 190,180 10,180" fill="#1793d1" stroke="#fff" stroke-width="3"/><polygon points="100,30 170,170 30,170" fill="#1c1c1c"/><text x="50%" y="85%" text-anchor="middle" fill="#fff" font-family="monospace" font-size="24" font-weight="bold">ZEnITH</text></svg></a>ZEnITH - Arch Media Station<span class="subtitle">Running on {{ hostname }}</span></h1>
            <a href="/web/" target="_blank">Jellyfin</a><a href="/torrent/" target="_blank">qBittorrent</a><a href="/admin/" target="_blank">Cockpit</a><a href="/stats/" target="_blank">Glances</a>
            </body></html>
        - dest: /var/www/html/favicon.svg
          content: |
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
              <polygon points="100,30 190,180 10,180" fill="#1793d1" stroke="#fff" stroke-width="3"/>
              <polygon points="100,50 170,170 30,170" fill="#1c1c1c"/>
              <text x="50%" y="85%" text-anchor="middle" fill="#fff" font-family="monospace" font-size="48" font-weight="bold">Z</text>
            </svg>

    - name: Deploy nginx config
      copy:
        dest: /etc/nginx/nginx.conf
        mode: "0644"
        content: |
          worker_processes auto;
          events { worker_connections 1024; }
          http {
            upstream cockpit     { server 127.0.0.1:9090; }
            upstream jellyfin    { server 127.0.0.1:8096; }
            upstream qbittorrent { server 127.0.0.1:8080; }
            upstream glances     { server 127.0.0.1:61208; }
            include mime.types;
            default_type application/octet-stream;
            sendfile on; keepalive_timeout 65; server_tokens off;
            server {
              listen 80 default_server;
              server_name {{ hostname }};
              return 301 https://$host$request_uri;
            }
            server {
              listen 443 ssl default_server;
              server_name {{ hostname }};
              ssl_certificate     {{ ssl_cert_dir }}/{{ hostname }}.crt;
              ssl_certificate_key {{ ssl_cert_dir }}/{{ hostname }}.key;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_session_cache shared:SSL:10m; ssl_session_timeout 10m;
              ssl_prefer_server_ciphers on; ssl_session_tickets off;
              proxy_request_buffering off;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Protocol $scheme;
              proxy_set_header X-Forwarded-Host $http_host;
              location = /favicon.svg { alias /var/www/html/favicon.svg; }
              location /ams          { alias /var/www/html/; index index.html; }
              location = /           { return 302 https://$host/web/; }
              location /             { proxy_pass http://jellyfin; proxy_buffering off; }
              location = /web/       { proxy_pass http://jellyfin/web/index.html; }
              location /socket {
                proxy_pass http://jellyfin;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
              location /torrent/ { proxy_pass http://qbittorrent/; }
              location /admin/ {
                proxy_pass http://cockpit/admin/;
                proxy_ssl_verify off; proxy_http_version 1.1; proxy_buffering off; gzip off;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
              location /stats/ {
                proxy_pass http://glances/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }
          }
      notify: restart nginx

    - name: Validate nginx config
      command: nginx -t
      changed_when: false

    # auto-update
    - name: Deploy ams-update script
      copy:
        dest: /usr/local/bin/ams-update
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu
          LOG="/var/log/ams-update.log"
          { echo "[$(date '+%F %T')] AMS update started"
            pacman -Syu --noconfirm || true
            pacman -Qdtq 2>/dev/null | xargs -r pacman -Rns --noconfirm || true
            echo "[$(date '+%F %T')] AMS update finished"
          } 2>&1 | tee -a "$LOG"

    - name: Deploy ams-update systemd units
      copy:
        dest: "{{ item.dest }}"
        mode: "0644"
        content: "{{ item.content }}"
      loop:
        - dest: /etc/systemd/system/ams-update.service
          content: |
            [Unit]
            Description=AMS Automatic Update
            After=network.target
            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/ams-update
        - dest: /etc/systemd/system/ams-update.timer
          content: |
            [Unit]
            Description=Run AMS update daily
            [Timer]
            OnCalendar=daily
            Persistent=true
            [Install]
            WantedBy=timers.target

    - name: Manage ams-update timer
      systemd:
        name: ams-update.timer
        daemon_reload: true
        state: "{{ 'started' if enable_automatic_updates | bool else 'stopped' }}"
        enabled: "{{ enable_automatic_updates | bool }}"

    # tmux
    - name: Configure system-wide tmux
      copy:
        dest: /etc/tmux.conf
        mode: "0644"
        content: |
          set -g history-limit 999999
          set -g mouse on
          set -g default-terminal "tmux-256color"
          set -g status-bg cyan
          set -g status-fg black

    # shell
    - name: Deploy shell configs
      copy:
        dest: "{{ item.dest }}"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
        content: "{{ item.content }}"
        force: "{{ item.force | default(true) }}"
      loop:
        - dest: "/home/{{ user_name }}/.bash_aliases"
          force: false
          content: |
            alias ll='ls -alF' la='ls -A' l='ls -CF' c='clear' h='history'
            alias gs='git status' gc='git commit' gp='git push'
            alias aliases="${EDITOR:-nano} $HOME/.bash_aliases"
        - dest: "/home/{{ user_name }}/.bashrc"
          content: |
            [[ $- != *i* ]] && return
            HISTSIZE=1000; HISTFILESIZE=2000; HISTCONTROL=ignoreboth:erasedups
            shopt -s histappend checkwinsize
            [ -f "$HOME/.bash_aliases" ] && . "$HOME/.bash_aliases"
            export PS1='\[\033[1;32m\][\[\033[1;37m\]\t\[\033[1;32m\]]\[\033[0m\] \[\033[1;37m\]\u\[\033[0m\]@\[\033[1;36m\]\H\[\033[0m\] \[\033[1;90m\]\w\[\033[0m\] \[$(if [ $? -eq 0 ]; then echo "\033[1;32m[✔]\033[0m"; else echo "\033[1;31m[✘]\033[0m"; fi)\] \$ '
        - dest: "/home/{{ user_name }}/.zsh_aliases"
          force: false
          content: |
            alias ls='ls --color=auto' ll='ls -alF' la='ls -A' l='ls -CF' c='clear' h='history'
            alias gs='git status' gc='git commit' gp='git push'
            alias aliases="${EDITOR:-nano} $HOME/.zsh_aliases"
        - dest: "/home/{{ user_name }}/.zshrc"
          content: |-
            {% raw %}
            [[ $- != *i* ]] && return
            autoload -U colors && colors
            HISTSIZE=1000; SAVEHIST=2000
            setopt hist_ignore_all_dups share_history auto_cd auto_pushd correct notify prompt_subst
            [ -f "$HOME/.zsh_aliases" ] && . "$HOME/.zsh_aliases"
            PROMPT='%{%F{green}%}[%{%F{white}%}%*%{%F{green}%}]%{%f%} %{%F{white}%}%n%{%f%}@%{%F{cyan}%}%m%{%f%} %{%F{black}%}%~%{%f%} $(if [[ $? -eq 0 ]]; then echo "%{%F{green}%}[✔]%{%f%}"; else echo "%{%F{red}%}[✘]%{%f%}"; fi) \$ '
            {% endraw %}

    # graphical
    - name: Configure graphical environment
      when: enable_graphical
      block:
        - name: Add user to graphical groups
          user:
            name: "{{ user_name }}"
            groups: [video, input, audio, render, storage, optical, lp]
            append: true

        - name: Deploy jellyfin-kiosk wrapper
          copy:
            dest: /usr/local/bin/jellyfin-kiosk
            mode: "0755"
            content: |
              #!/bin/sh
              exec firefox --kiosk "https://$(hostnamectl --transient)/web/"

        - name: Deploy .xinitrc
          copy:
            dest: "/home/{{ user_name }}/.xinitrc"
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
            mode: "0755"
            content: |
              xset -dpms
              xset s off
              exec openbox-session

        - name: Add startx on tty1 to .bash_profile
          blockinfile:
            dest: "/home/{{ user_name }}/.bash_profile"
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
            mode: "0644"
            create: true
            block: |
              if [[ -z $DISPLAY ]] && [[ $(tty) = /dev/tty1 ]]; then startx; fi

        - name: Ensure config directories exist
          file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
          loop:
            - /usr/share/backgrounds
            - "/home/{{ user_name }}/.config/openbox"
            - "/home/{{ user_name }}/.config/rofi"

        - name: Deploy wallpaper
          copy:
            dest: /usr/share/backgrounds/zenith-wallpaper.svg
            content: "{{ wallpaper_svg }}"
            mode: "0644"

        - name: Deploy Openbox autostart
          copy:
            dest: "/home/{{ user_name }}/.config/openbox/autostart"
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
            mode: "0644"
            content: |
              {% for p in openbox_autostart_programs if p is defined %}
              {{ p }}
              {% endfor %}

        - name: Deploy graphical config files
          copy:
            dest: "{{ item.dest }}"
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
            mode: "0644"
            content: "{{ item.content }}"
          loop:
            - dest: "/home/{{ user_name }}/.config/openbox/rc.xml"
              content: |
                <?xml version="1.0" encoding="UTF-8"?><openbox_config xmlns="http://openbox.org/3.4/rc" xmlns:xi="http://www.w3.org/2001/XInclude"><resistance><strength>10</strength><screen_edge_strength>20</screen_edge_strength></resistance><focus><focusNew>yes</focusNew><followMouse>no</followMouse><focusLast>yes</focusLast><underMouse>no</underMouse><focusDelay>200</focusDelay><raiseOnFocus>no</raiseOnFocus></focus><placement><policy>Smart</policy><center>yes</center><monitor>Primary</monitor><primaryMonitor>1</primaryMonitor></placement><theme><n>Natura</n><titleLayout>NLIMC</titleLayout><keepBorder>yes</keepBorder><animateIconify>yes</animateIconify><font place="ActiveWindow"><n>sans</n><size>8</size><weight>bold</weight><slant>normal</slant></font><font place="InactiveWindow"><n>sans</n><size>8</size><weight>bold</weight><slant>normal</slant></font><font place="MenuHeader"><n>sans</n><size>9</size><weight>normal</weight><slant>normal</slant></font><font place="MenuItem"><n>sans</n><size>9</size><weight>normal</weight><slant>normal</slant></font><font place="ActiveOnScreenDisplay"><n>sans</n><size>9</size><weight>bold</weight><slant>normal</slant></font><font place="InactiveOnScreenDisplay"><n>sans</n><size>9</size><weight>bold</weight><slant>normal</slant></font></theme><desktops><number>1</number><firstdesk>1</firstdesk><names><n>Main</n></names><popupTime>875</popupTime></desktops><resize><drawContents>yes</drawContents><popupShow>Nonpixel</popupShow><popupPosition>Center</popupPosition><popupFixedPosition><x>10</x><y>10</y></popupFixedPosition></resize><margins><top>0</top><bottom>0</bottom><left>0</left><right>0</right></margins><dock><position>TopLeft</position><floatingX>0</floatingX><floatingY>0</floatingY><noStrut>no</noStrut><stacking>Above</stacking><direction>Vertical</direction><autoHide>no</autoHide><hideDelay>300</hideDelay><showDelay>300</showDelay><moveButton>Middle</moveButton></dock><keyboard><chainQuitKey>C-g</chainQuitKey><keybind key="A-F4"><action name="Close"/></keybind><keybind key="W-q"><action name="Close"/></keybind><keybind key="A-Escape"><action name="Lower"/><action name="FocusToBottom"/><action name="Unfocus"/></keybind><keybind key="A-space"><action name="ShowMenu"><menu>client-menu</menu></action></keybind><keybind key="A-Tab"><action name="NextWindow"><finalactions><action name="Focus"/><action name="Raise"/><action name="Unshade"/></finalactions></action></keybind><keybind key="A-S-Tab"><action name="PreviousWindow"><finalactions><action name="Focus"/><action name="Raise"/><action name="Unshade"/></finalactions></action></keybind><keybind key="C-A-Tab"><action name="NextWindow"><panels>yes</panels><desktop>yes</desktop><finalactions><action name="Focus"/><action name="Raise"/><action name="Unshade"/></finalactions></action></keybind><keybind key="W-S-Right"><action name="DirectionalCycleWindows"><direction>right</direction></action></keybind><keybind key="W-S-Left"><action name="DirectionalCycleWindows"><direction>left</direction></action></keybind><keybind key="W-S-Up"><action name="DirectionalCycleWindows"><direction>up</direction></action></keybind><keybind key="W-S-Down"><action name="DirectionalCycleWindows"><direction>down</direction></action></keybind><keybind key="W-d"><action name="ToggleShowDesktop"/></keybind><keybind key="W-space"><action name="Execute"><command>rofi</command></action></keybind><keybind key="W-t"><action name="Execute"><command>xterm</command></action></keybind><keybind key="W-w"><action name="Execute"><command>firefox</command></action></keybind><keybind key="W-e"><action name="Execute"><command>doublecmd</command></action></keybind><keybind key="W-j"><action name="Execute"><command>jellyfin-kiosk</command></action></keybind><keybind key="C-S-Escape"><action name="Execute"><command>qps</command></action></keybind><keybind key="C-A-Delete"><action name="Exit"/></keybind></keyboard><mouse><dragThreshold>1</dragThreshold><doubleClickTime>200</doubleClickTime><screenEdgeWarpTime>400</screenEdgeWarpTime><screenEdgeWarpMouse>false</screenEdgeWarpMouse><context name="Frame"><mousebind button="A-Left" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="A-Left" action="Click"><action name="Unshade"/></mousebind><mousebind button="A-Left" action="Drag"><action name="Move"/></mousebind><mousebind button="A-Right" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="A-Right" action="Drag"><action name="Resize"/></mousebind><mousebind button="A-Middle" action="Press"><action name="Lower"/><action name="FocusToBottom"/><action name="Unfocus"/></mousebind></context><context name="Titlebar"><mousebind button="Left" action="Drag"><action name="Move"/></mousebind><mousebind button="Left" action="DoubleClick"><action name="ToggleMaximize"/></mousebind><mousebind button="Up" action="Click"><action name="if"><shaded>no</shaded><then><action name="Shade"/><action name="FocusToBottom"/><action name="Unfocus"/><action name="Lower"/></then></action></mousebind><mousebind button="Down" action="Click"><action name="if"><shaded>yes</shaded><then><action name="Unshade"/><action name="Raise"/></then></action></mousebind></context><context name="Titlebar Top Right Bottom Left TLCorner TRCorner BRCorner BLCorner"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Middle" action="Press"><action name="Lower"/><action name="FocusToBottom"/><action name="Unfocus"/></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/><action name="ShowMenu"><menu>client-menu</menu></action></mousebind></context><context name="Top"><mousebind button="Left" action="Drag"><action name="Resize"><edge>top</edge></action></mousebind></context><context name="Left"><mousebind button="Left" action="Drag"><action name="Resize"><edge>left</edge></action></mousebind></context><context name="Right"><mousebind button="Left" action="Drag"><action name="Resize"><edge>right</edge></action></mousebind></context><context name="Bottom"><mousebind button="Left" action="Drag"><action name="Resize"><edge>bottom</edge></action></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/><action name="ShowMenu"><menu>client-menu</menu></action></mousebind></context><context name="TRCorner BRCorner TLCorner BLCorner"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Left" action="Drag"><action name="Resize"/></mousebind></context><context name="Client"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="Middle" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/></mousebind></context><context name="Icon"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/><action name="ShowMenu"><menu>client-menu</menu></action></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/><action name="ShowMenu"><menu>client-menu</menu></action></mousebind></context><context name="AllDesktops"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Left" action="Click"><action name="ToggleOmnipresent"/></mousebind></context><context name="Shade"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="Left" action="Click"><action name="ToggleShade"/></mousebind></context><context name="Iconify"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="Left" action="Click"><action name="Iconify"/></mousebind></context><context name="Maximize"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Middle" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Left" action="Click"><action name="ToggleMaximize"/></mousebind><mousebind button="Middle" action="Click"><action name="ToggleMaximize"><direction>vertical</direction></action></mousebind><mousebind button="Right" action="Click"><action name="ToggleMaximize"><direction>horizontal</direction></action></mousebind></context><context name="Close"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/><action name="Unshade"/></mousebind><mousebind button="Left" action="Click"><action name="Close"/></mousebind></context><context name="Desktop"><mousebind button="Left" action="Press"><action name="Focus"/><action name="Raise"/></mousebind><mousebind button="Right" action="Press"><action name="Focus"/><action name="Raise"/></mousebind></context><context name="Root"><mousebind button="Middle" action="Press"><action name="ShowMenu"><menu>client-list-combined-menu</menu></action></mousebind><mousebind button="Right" action="Press"><action name="ShowMenu"><menu>root-menu</menu></action></mousebind></context><context name="MoveResize"><mousebind button="Up" action="Click"><action name="GoToDesktop"><to>previous</to></action></mousebind><mousebind button="Down" action="Click"><action name="GoToDesktop"><to>next</to></action></mousebind><mousebind button="A-Up" action="Click"><action name="GoToDesktop"><to>previous</to></action></mousebind><mousebind button="A-Down" action="Click"><action name="GoToDesktop"><to>next</to></action></mousebind></context></mouse><menu><file>menu.xml</file><hideDelay>200</hideDelay><middle>no</middle><submenuShowDelay>100</submenuShowDelay><submenuHideDelay>400</submenuHideDelay><showIcons>yes</showIcons><manageDesktops>no</manageDesktops></menu><applications></applications></openbox_config>
            - dest: "/home/{{ user_name }}/.config/openbox/menu.xml"
              content: |
                <?xml version="1.0" encoding="UTF-8"?><openbox_menu xmlns="http://openbox.org/3.4/menu"><menu id="root-menu" label="Openbox 3"><item label="Terminal  [Win+T]"><action name="Execute"><command>xterm</command></action></item><item label="Web Browser  [Win+W]"><action name="Execute"><command>firefox</command></action></item><item label="File Manager  [Win+E]"><action name="Execute"><command>doublecmd</command></action></item><item label="Jellyfin  [Win+J]"><action name="Execute"><command>jellyfin-kiosk</command></action></item><item label="Task Manager  [Ctrl+Shift+Esc]"><action name="Execute"><command>qps</command></action></item><item label="Run...  [Win+Space]"><action name="Execute"><command>rofi</command></action></item><separator/><item label="Reconfigure Openbox"><action name="Reconfigure"/></item><item label="Restart Openbox"><action name="Restart"/></item><item label="Log Out"><action name="Exit"><prompt>yes</prompt></action></item></menu></openbox_menu>
            - dest: "/home/{{ user_name }}/.config/rofi/config.rasi"
              content: |
                *{font:"monospace 10";background-color:#0c0d0e;text-color:#c8c8c8;border-color:#1793d1}window{width:480px;border:1px;padding:0;background-color:#0c0d0e}inputbar{background-color:#111315;border:0 0 1px 0;border-color:#1793d1;padding:6px 8px;children:[prompt,entry]}prompt{text-color:#1793d1;padding:0 6px 0 0}entry{text-color:#ffffff;background-color:transparent}listview{background-color:#0c0d0e;padding:4px 0;lines:8;spacing:0}element{padding:5px 10px;background-color:transparent;text-color:#c8c8c8}element selected{background-color:#1793d1;text-color:#ffffff}element-icon{size:1.2em;padding:0 6px 0 0}

    # autologin
    - name: Configure console autologin on tty1
      when: enable_autologin
      block:
        - name: Ensure getty override directory
          file:
            path: /etc/systemd/system/getty@tty1.service.d
            state: directory
            mode: "0755"

        - name: Write autologin override
          copy:
            dest: /etc/systemd/system/getty@tty1.service.d/autologin.conf
            mode: "0644"
            content: |
              [Service]
              ExecStart=
              ExecStart=-/usr/bin/agetty --autologin {{ user_name }} --noclear %I $TERM

        - name: Enable getty@tty1
          systemd:
            name: getty@tty1
            enabled: true
            daemon_reload: true

    # services
    - name: Enable and start system services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ svc_core }}"

    - name: Flush handlers
      meta: flush_handlers

    - name: Reboot after first-time install
      reboot:
        reboot_timeout: "{{ reboot_timeout }}"
      ignore_unreachable: true
      when: execute_system_installation | default(false) | bool

  # · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·
  handlers:
    - name: regenerate grub config
      command: grub-mkconfig -o /boot/grub/grub.cfg

    - name: update ca trust
      command: update-ca-trust

    - name: restart cockpit
      systemd: { name: cockpit.socket, state: restarted, daemon_reload: true }

    - name: restart nginx
      systemd: { name: nginx, state: restarted, daemon_reload: true }

    - name: restart qbittorrent
      systemd: { name: qbittorrent-nox, state: restarted, daemon_reload: true }

    - name: restart ufw
      systemd: { name: ufw, state: restarted, daemon_reload: true }
